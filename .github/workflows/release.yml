name: Release

# Triggers on every tag push (v0.1.0, v0.2.0, …) or a manual run from the
# Actions tab. The job fetches the kaikki Wiktionary dumps, rebuilds both
# packs from scratch, builds the Tauri installer, and uploads it to the
# corresponding GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The kaikki dumps are large; cache them so re-runs of the same
      # workflow on the same tag don't re-download hundreds of MB.
      - name: Cache kaikki dumps
        uses: actions/cache@v4
        with:
          path: pipeline/data
          key: kaikki-dumps-v1

      - name: Fetch kaikki dumps
        shell: bash
        run: |
          python pipeline/sources/fetch_kaikki.py \
            --url https://kaikki.org/dictionary/Spanish/kaikki.org-dictionary-Spanish.jsonl \
            --output pipeline/data/kaikki-spanish.jsonl
          python pipeline/sources/fetch_kaikki.py \
            --url https://kaikki.org/dictionary/French/kaikki.org-dictionary-French.jsonl \
            --output pipeline/data/kaikki-french.jsonl

      - name: Build Spanish pack
        shell: bash
        run: |
          python pipeline/sources/kaikki_spanish.py \
            pipeline/data/kaikki-spanish.jsonl \
            --output pipeline/build/spanish.normalized.jsonl
          mkdir -p apps/desktop/src-tauri/resources
          python pipeline/build_pack.py \
            --input pipeline/build/spanish.normalized.jsonl \
            --output apps/desktop/src-tauri/resources/spanish-en.db \
            --language es

      - name: Build French pack
        shell: bash
        run: |
          python pipeline/sources/kaikki_french.py \
            pipeline/data/kaikki-french.jsonl \
            --output pipeline/build/french.normalized.jsonl
          python pipeline/build_pack.py \
            --input pipeline/build/french.normalized.jsonl \
            --output apps/desktop/src-tauri/resources/french-en.db \
            --language fr

      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri installer
        working-directory: apps/desktop
        run: pnpm tauri build

      - name: Upload installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true

      # When the workflow is dispatched manually (not via a tag), expose
      # the installer as a regular artifact instead of a release asset so
      # you can grab it from the workflow run page.
      - name: Upload installer as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: lexil-windows-installer
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
